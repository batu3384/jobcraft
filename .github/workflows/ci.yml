# CI for Jobcraft: LaTeX smoke, skill lint, security guards, CLI typechecks.
#
# Live portal smoke tests are intentionally omitted (network flaky; LinkedIn ToS).

name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint skills, commands, settings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - run: python tools/lint_skills.py
      - name: Framework version guard
        run: python tools/check_framework_version.py

  security-guards:
    name: Security guards (permissions, gitignore, manifests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: python tools/security_guards.py

  python-tests:
    name: Python tool tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: python -m unittest discover -s tests -t . -v

  latex-smoke:
    name: Compile example CV and cover letter
    runs-on: ubuntu-latest
    container: texlive/texlive:latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install PDF inspection tools
        run: |
          if ! command -v pdfinfo >/dev/null || ! command -v pdftotext >/dev/null; then
            apt-get update
            apt-get install -y --no-install-recommends poppler-utils
          fi
      - name: Compile CV example (lualatex)
        run: |
          cd cv
          lualatex -interaction=nonstopmode -halt-on-error main_example.tex
          test -f main_example.pdf
          if grep -q '^!' main_example.log; then
            echo '::error::lualatex reported errors compiling cv/main_example.tex'
            grep -A3 '^!' main_example.log
            exit 1
          fi
      - name: Compile cover letter example (xelatex)
        run: |
          cd cover_letters
          xelatex -interaction=nonstopmode -halt-on-error cover_example.tex
          test -f cover_example.pdf
          if grep -q '^!' cover_example.log; then
            echo '::error::xelatex reported errors compiling cover_letters/cover_example.tex'
            grep -A3 '^!' cover_example.log
            exit 1
          fi
      - name: Verify extractable PDF text
        run: |
          python3 tools/verify_pdf.py cv/main_example.pdf --min-chars 100
          python3 tools/verify_pdf.py cover_letters/cover_example.pdf --min-chars 100

  cli-checks:
    name: CLI checks ${{ matrix.tool }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tool:
          - linkedin-search
          - kariyer-net-search
          - yenibiris-search
          - eleman-net-search
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - run: bun install
        working-directory: .agents/skills/${{ matrix.tool }}/cli
      - run: bun run typecheck
        working-directory: .agents/skills/${{ matrix.tool }}/cli
      - name: Run fixture/mock tests
        run: |
          TOOL="${{ matrix.tool }}"
          if find tests -type f -name '*.test.ts' | grep -q .; then
            bun test
          elif [[ "$TOOL" == "kariyer-net-search" || "$TOOL" == "yenibiris-search" || "$TOOL" == "eleman-net-search" ]]; then
            echo "::error::$TOOL requires Bun tests but none were found"
            exit 1
          else
            echo "No Bun tests found for $TOOL; skipping"
          fi
        working-directory: .agents/skills/${{ matrix.tool }}/cli

  resilient-fetch:
    name: resilient-fetch unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - run: bun test ./.agents/skills/_lib/resilient-fetch.spec.ts
